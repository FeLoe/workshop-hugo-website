# ============================================================
# STEP 1: Change these two lines to your own info
# ============================================================
title: "Marvin Penguin"
baseURL: "https://yourname.netlify.app/"

# ============================================================
# Leave everything below as-is to get started
# ============================================================
defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

enableRobotsTXT: true
summaryLength: 30

pagination:
  pagerSize: 10

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-reveal

outputs:
  home: ["HTML", "RSS", "JSON", "WebAppManifest", "headers", "redirects"]
  section: ["HTML", "RSS"]

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true

security:
  funcs:
    getenv:
      - "^HUGO_"
      - "^CI$"
      - "^WC_.*$"

menu:
  main:
    - name: About
      url: "/#about"
      weight: 10
    - name: Publications
      url: "/#publications"
      weight: 20
    - name: Talks
      url: "/#talks"
      weight: 30
    - name: CV
      url: "/uploads/cv.pdf"
      weight: 40
